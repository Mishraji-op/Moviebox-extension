name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Validate Gradle wrapper presence
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Gradle wrapper not found in this repo."
            echo "Add gradle wrapper files (gradlew, gradlew.bat, gradle/wrapper/*) to enable CI build."
            exit 1
          fi

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace --no-daemon
