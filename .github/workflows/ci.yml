name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties

      - name: Validate Gradle wrapper presence
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "Gradle wrapper not found in this repo."
            echo "Add gradle wrapper files (gradlew, gradlew.bat, gradle/wrapper/*) to enable CI build."
            exit 1
          fi

      - name: Build Plugin
        run: |
          chmod +x ./gradlew
          ./gradlew MovieBoxProviderIN:make --stacktrace --no-daemon
